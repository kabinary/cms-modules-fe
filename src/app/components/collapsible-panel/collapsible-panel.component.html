<div class="card overflow-hidden">
  <button type="button" (click)="toggle()" class="w-full px-6 py-5 text-left flex justify-between items-center gap-4 hover:bg-sand-50 transition-colors">
    <h3 class="text-h3">{{ title }}</h3>
    <svg [class.rotate-180]="open" class="w-5 h-5 text-indigo-600 transition-transform duration-200 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
    </svg>
  </button>
  <div *ngIf="open" class="px-6 pb-6 pt-2 border-t border-sand-200">
    <ng-content></ng-content>
  </div>
</div>
