<header class="sticky top-0 z-40 backdrop-blur-md backdrop-saturate-150 bg-white/75 border-b border-ink/[0.06]">
  <div class="container-x flex items-center justify-between h-[68px]">
    <a [routerLink]="'/' + appRoutes.HOME" class="flex items-center gap-3 group" (click)="closeMenu()">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-card bg-indigo-600 text-white font-semibold text-base shadow-soft group-hover:bg-indigo-700 transition-colors">K</span>
      <span class="font-semibold text-[17px] tracking-tight text-ink">Kabinary Joomla Modules</span>
    </a>

    <nav class="hidden md:flex items-center gap-7 text-[14.5px] text-ink/80">
      <a [routerLink]="'/' + appRoutes.HOME" class="hover:text-indigo-600 transition-colors">Home</a>
      <a [routerLink]="'/' + appRoutes.MEMBER_DIRECTORY_MODULE_DEMO" class="hover:text-indigo-600 transition-colors">Demo</a>
      <a [routerLink]="'/' + appRoutes.MEMBER_DIRECTORY_INSTALLATION_GUIDE" class="hover:text-indigo-600 transition-colors">Installation</a>
      <a [routerLink]="'/' + appRoutes.MEMBER_DIRECTORY_MODULE_LICENSE" class="btn btn-primary btn-sm">Get a License</a>
    </nav>

    <button type="button"
            (click)="toggleMenu()"
            class="md:hidden inline-flex items-center justify-center h-10 w-10 rounded-btn text-ink hover:bg-sand-100"
            [attr.aria-expanded]="isMenuOpen"
            aria-label="Toggle navigation menu">
      <svg *ngIf="!isMenuOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      <svg *ngIf="isMenuOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>

  <div *ngIf="isMenuOpen" class="md:hidden border-t border-ink/[0.06] bg-white/95 backdrop-blur-md">
    <div class="container-x flex flex-col gap-1 py-3">
      <a [routerLink]="'/' + appRoutes.HOME" (click)="closeMenu()" class="block px-3 py-3 rounded-btn text-ink hover:bg-sand-100">Home</a>
      <a [routerLink]="'/' + appRoutes.MEMBER_DIRECTORY_MODULE_DEMO" (click)="closeMenu()" class="block px-3 py-3 rounded-btn text-ink hover:bg-sand-100">Demo</a>
      <a [routerLink]="'/' + appRoutes.MEMBER_DIRECTORY_INSTALLATION_GUIDE" (click)="closeMenu()" class="block px-3 py-3 rounded-btn text-ink hover:bg-sand-100">Installation</a>
      <a [routerLink]="'/' + appRoutes.MEMBER_DIRECTORY_MODULE_LICENSE" (click)="closeMenu()" class="btn btn-primary btn-md mt-1">Get a License</a>
    </div>
  </div>
</header>
